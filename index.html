<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Height Optimizer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;font-family:'Segoe UI',system-ui,sans-serif;color:#e0e0e0;max-width:420px;margin:0 auto;min-height:100vh;overflow-x:hidden}
.header{padding:20px 20px 12px;background:linear-gradient(135deg,#0f0f1a,#1a0a2e)}
.header-row{display:flex;justify-content:space-between;align-items:center}
.brand{font-size:11px;color:#ff6b35;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.name{font-size:22px;font-weight:700;color:#fff;margin-top:4px}
.height-big{font-size:28px;font-weight:700;color:#ff6b35;text-align:right}
.height-sub{font-size:11px;color:#888;text-align:right}
.bar-wrap{height:8px;border-radius:4px;background:#1a1a2e;overflow:hidden;margin-top:6px}
.bar-fill{height:100%;border-radius:4px;transition:width 0.5s}
.bar-labels{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-top:12px;margin-bottom:4px}
.content{padding:12px 16px;padding-bottom:80px}
.card{background:#12121e;border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid #1a1a2e}
.card-title{font-size:16px;font-weight:700;margin-bottom:8px}
.check-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #1a1a2e;cursor:pointer}
.check-row.done{opacity:0.6}
.checkbox{width:24px;height:24px;border-radius:8px;border:2px solid #333;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;transition:all 0.2s;color:#000;font-weight:700}
.checkbox.checked{border:none;background:#00e676}
.check-label{font-size:14px}
.check-label.done{text-decoration:line-through}
.info-box{border-radius:12px;padding:14px;margin-bottom:10px}
.info-box.purple{background:#1a0a2e}
.info-box.green{background:#0a1a0a}
.info-box.red{background:#1a0a0a}
.info-box.blue{background:#0a0a2e}
.info-title{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.info-text{font-size:12px;color:#aaa;line-height:1.6}
.ex-list-item{display:flex;gap:14px;align-items:center;cursor:pointer}
.ex-img{width:70px;height:70px;border-radius:12px;object-fit:cover;flex-shrink:0;background:#1a1a2e}
.ex-img-big{width:100%;height:220px;border-radius:12px;object-fit:contain;background:#1a1a2e;margin-bottom:16px}
.ex-name{font-size:15px;font-weight:700;color:#fff}
.ex-cat{font-size:11px;color:#ff6b35;margin-top:2px}
.ex-meta{font-size:11px;color:#888;margin-top:2px}
.pill{padding:6px 14px;border-radius:20px;border:none;font-size:12px;font-weight:600;display:inline-block;margin-right:8px;margin-top:8px}
.pill.active{background:#ff6b35;color:#fff}
.pill.inactive{background:#1a1a2e;color:#888}
.back-btn{background:none;border:none;color:#ff6b35;font-size:14px;cursor:pointer;margin-bottom:12px;padding:0}
.timer-wrap{text-align:center;padding:16px 0}
.timer-circle{position:relative;width:140px;height:140px;margin:0 auto}
.timer-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.timer-num{font-size:36px;font-weight:700;font-family:monospace}
.timer-btns{display:flex;gap:12px;justify-content:center;margin-top:16px}
.btn-start{padding:10px 28px;border-radius:25px;border:none;font-weight:600;font-size:15px;cursor:pointer}
.btn-reset{padding:10px 20px;border-radius:25px;border:1px solid #333;background:transparent;color:#888;font-size:14px;cursor:pointer}
.schedule-toggle{display:flex;gap:6px;margin-bottom:16px;margin-top:8px;flex-wrap:wrap}
.schedule-btn{padding:8px 12px;border-radius:20px;border:none;font-weight:600;cursor:pointer;font-size:12px}
.schedule-btn.active{background:#ff6b35;color:#fff}
.schedule-btn.inactive{background:#1a1a2e;color:#888}
.timeline-row{display:flex;gap:12px;align-items:flex-start;margin-bottom:2px}
.timeline-bar{width:2px;min-height:50px;border-radius:1px;flex-shrink:0;margin-left:24px}
.critica-tag{font-size:9px;background:#ff3b5c22;color:#ff3b5c;padding:2px 8px;border-radius:10px;font-weight:600}
.love-tag{font-size:9px;background:#ff69b422;color:#ff69b4;padding:2px 8px;border-radius:10px;font-weight:600}
.nutr-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.nutr-emoji{font-size:24px}
.nutr-name{font-size:15px;font-weight:700;color:#fff}
.nutr-daily{font-size:11px;color:#ff6b35}
.nutr-why{font-size:12px;color:#aaa;margin-bottom:6px}
.nutr-foods{font-size:12px;color:#888;background:#1a1a2e;padding:8px 12px;border-radius:8px}
.avoid-item{display:flex;gap:8px;align-items:center;padding:6px 0}
.avoid-x{color:#ff3b5c}
.progress-row{display:flex;justify-content:space-around;text-align:center}
.prog-num{font-size:28px;font-weight:700}
.prog-label{font-size:11px;color:#888}
.hist-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1a1a2e}
.input-row{display:flex;gap:8px}
.height-input{flex:1;padding:10px 14px;border-radius:12px;border:1px solid #333;background:#1a1a2e;color:#fff;font-size:14px}
.save-btn{padding:10px 20px;border-radius:12px;border:none;background:#ff6b35;color:#fff;font-weight:600;cursor:pointer}
.tip-box{background:#0a1a0a;border-radius:10px;padding:12px;margin-top:10px}
.tip-title{font-size:12px;color:#00e676;font-weight:600}
.tip-text{font-size:11px;color:#888;margin-top:4px}
.nav{position:fixed;bottom:0;left:0;right:0;max-width:420px;margin:0 auto;display:flex;justify-content:space-around;background:#0f0f1a;border-top:1px solid #1a1a2e;padding:8px 0 12px;z-index:10}
.nav-btn{background:none;border:none;font-size:10px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 12px}
.nav-btn.active{color:#ff6b35}
.nav-btn.inactive{color:#555}
.nav-icon{font-size:20px}
.section-title{font-size:18px;font-weight:700;margin-bottom:4px}
.section-sub{font-size:12px;color:#888;margin-bottom:16px}
</style>
</head>

function Timer({duration}) {
  const [tl,setTl]=useState(duration);
  const [run,setRun]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{setTl(duration);setRun(false)},[duration]);
  useEffect(()=>{
    if(run&&tl>0){ref.current=setInterval(()=>setTl(t=>t-1),1000)}
    else if(tl===0){clearInterval(ref.current);setRun(false)}
    return()=>clearInterval(ref.current);
  },[run,tl]);
  const pct=((duration-tl)/duration)*100;
  const c=tl>duration*0.6?"#00e676":tl>duration*0.3?"#ffb74d":"#ff3b5c";
  return(
    <div className="timer-wrap">
      <div className="timer-circle">
        <svg width="140" height="140" style={{transform:"rotate(-90deg)"}}>
          <circle cx="70" cy="70" r="60" stroke="#1a1a2e" strokeWidth="10" fill="none"/>
          <circle cx="70" cy="70" r="60" stroke={c} strokeWidth="10" fill="none" strokeDasharray={`${pct*3.77} ${377-pct*3.77}`} strokeLinecap="round" style={{transition:"stroke-dasharray 0.3s"}}/>
        </svg>
        <div className="timer-text"><div className="timer-num" style={{color:c}}>{tl}s</div></div>
      </div>
      <div className="timer-btns">
        <button className="btn-start" style={{background:run?"#ff3b5c":"#00e676",color:run?"#fff":"#000"}} onClick={()=>setRun(!run)}>{run?"⏸ Pausar":tl===0?"✅ Feito!":"▶ Iniciar"}</button>
        <button className="btn-reset" onClick={()=>{setTl(duration);setRun(false)}}>↻</button>
      </div>
    </div>
  );
}
